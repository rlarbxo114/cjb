<!DOCTYPE html>
<html lang="ko"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1">
<title>CJB청주방송 부자보고서</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Outfit:wght@300;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}body{background:linear-gradient(160deg,#080818,#0c1028 40%,#101824);font-family:'Pretendard','Apple SD Gothic Neo',sans-serif;color:#e4e4f0;min-height:100vh;padding:24px 16px}
.jm{font-family:'JetBrains Mono',monospace}.cd{background:rgba(255,255,255,.025);border-radius:16px;border:1px solid rgba(255,255,255,.06);padding:20px;margin-bottom:20px}
.g{display:grid;gap:8px}.g2{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}.g4{grid-template-columns:repeat(auto-fit,minmax(155px,1fr))}.gp{grid-template-columns:repeat(auto-fit,minmax(90px,1fr))}.ga{grid-template-columns:repeat(auto-fit,minmax(110px,1fr))}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;background:rgba(255,255,255,.08);border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#6c8aff;border:3px solid #0c1028;cursor:pointer}
.inp{width:100%;padding:10px 14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:10px;color:#f0f0f0;font-size:15px;outline:none;font-family:'JetBrains Mono',monospace}.inp:focus{border-color:#6c8aff}.inps{padding:7px 10px;font-size:12px}
.lbl{font-size:10px;color:#7a84a6;text-transform:uppercase;letter-spacing:.08em;font-weight:600;margin-bottom:5px;display:block}
button{cursor:pointer;transition:all .15s;font-family:inherit}.btn{padding:3px 9px;border-radius:6px;font-size:10px;font-weight:600;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03);color:#6b7394}
.tab{padding:8px 14px;border-radius:10px;font-size:11px;font-weight:600;border:1px solid rgba(255,255,255,.06);background:rgba(255,255,255,.02);color:#5c6888;white-space:nowrap}.tab.on{border-color:#6c8aff;background:rgba(108,138,255,.12);color:#a8baff}
tr:hover{background:rgba(108,138,255,.06)!important}
@media(max-width:600px){.g2{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}.gn{grid-template-columns:1fr!important}}
</style></head><body><div id="app"></div>
<script>
const NC={5:14.2,10:19.6,15:18,20:15.1,30:14.5,40:13.8};
const NY={2006:7.1,2007:19,2008:-41.7,2009:54.7,2010:20,2011:3.4,2012:18.1,2013:36.6,2014:19.2,2015:9.5,2016:7.1,2017:32.7,2018:-0.1,2019:39,2020:48.6,2021:27.4,2022:-32.6,2023:56.4,2024:25.7,2025:19.5};
const AL=[{l:"공격형",b:0},{l:"성장형",b:20},{l:"균형형",b:40},{l:"안정형",b:60},{l:"보수형",b:80},{l:"채권형",b:100}];
const fK=v=>{const a=Math.abs(v),s=v<0?"-":"";if(a>=1e8){const u=Math.floor(a/1e8),m=Math.floor((a%1e8)/1e4);return m>0?s+u+"억 "+m.toLocaleString()+"만원":s+u+"억원";}if(a>=1e4)return s+Math.floor(a/1e4).toLocaleString()+"만원";return s+a.toLocaleString()+"원";};
const fS=v=>{const a=Math.abs(v);if(a>=1e8)return(v/1e8).toFixed(1)+"억";if(a>=1e4)return(v/1e4).toFixed(0)+"만";return v.toLocaleString();};
const fU=v=>"$"+v.toLocaleString(undefined,{maximumFractionDigits:0});
function fgC(s){if(s<=25)return"#dc2626";if(s<=45)return"#f97316";if(s<=55)return"#eab308";if(s<=75)return"#22c55e";return"#06b6d4";}
function fgL(s){if(s<=25)return"극도의 공포";if(s<=45)return"공포";if(s<=55)return"중립";if(s<=75)return"탐욕";return"극도의 탐욕";}
function fgAct(s){if(s<=20)return{t:"📢 강력 매수 구간",c:"#dc2626"};if(s<=40)return{t:"📢 분할 매수 구간",c:"#f97316"};if(s<=60)return{t:"😐 중립 관망",c:"#eab308"};if(s<=75)return{t:"📢 분할 매도 검토",c:"#22c55e"};return{t:"📢 강력 매도 구간",c:"#06b6d4"};}

let S={P:50000000,M:500000,Y:10,EX:1450,SP:20,CR:null,d5:1e6,d10:2e6,d15:3e6,f5:3,f10:1.5,f15:0.5,BR:4,BO:100,RM:3e6,RY:30,tab:"chart",ndqNow:17648,ndqATH:20204,fgScore:30};
try{const sv=localStorage.getItem("cjb_v6");if(sv)S={...S,...JSON.parse(sv)};}catch(e){}
function save(){try{localStorage.setItem("cjb_v6",JSON.stringify(S));}catch(e){}}

let FG={hist:[]};

function runSim(a,b){const mR=Math.pow(1+a/100,1/12)-1,mB=Math.pow(1+S.BR/100,1/12)-1,sp=(100-b)/100,bp=b/100;const data=[];let sB=S.P*sp,bB=S.P*bp,tI=S.P,tD=0;const dips=[{e:S.d5,f:S.f5/12},{e:S.d10,f:S.f10/12},{e:S.d15,f:S.f15/12}];for(let m=0;m<=S.Y*12;m++){if(m>0){sB*=(1+mR);bB*=(1+mB);sB+=S.M*sp;bB+=S.M*bp;tI+=S.M;let ds=0;for(const d of dips)ds+=d.e*d.f;sB+=ds*sp;bB+=ds*bp;tI+=ds;tD+=ds;}if(m%12===0||m===S.Y*12){const t=sB+bB;data.push({lb:m===0?"시작":Math.floor(m/12)+"년",stk:Math.round(sB),bnd:Math.round(bB),bal:Math.round(t),inv:Math.round(tI),pft:Math.round(t-tI),pr:tI>0?((t-tI)/tI*100):0,bU:Math.round(t/S.EX),iU:Math.round(tI/S.EX)});}}return{data,tD:Math.round(tD)};}

function chart(data,vk,lk,color,h,gid){if(!data||data.length<2)return"";const w=680;h=h||130;const p={t:10,r:10,b:lk?24:10,l:55},iW=w-p.l-p.r,iH=h-p.t-p.b;const vals=data.map(d=>d[vk]),mx=Math.max(...vals),mn=Math.min(...vals),rng=mx-mn||1;const pts=data.map((d,i)=>({x:p.l+(i/(data.length-1))*iW,y:p.t+iH-((d[vk]-mn)/rng)*iH,d:d[lk]||"",v:d[vk]}));const path=pts.map((pt,i)=>(i===0?"M":"L")+pt.x+","+pt.y).join(" ");const area=path+"L"+pts[pts.length-1].x+","+(p.t+iH)+"L"+pts[0].x+","+(p.t+iH)+"Z";let s='<svg viewBox="0 0 '+w+" "+h+'" style="width:100%;max-height:'+(h+10)+'px">';s+='<defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".2"/><stop offset="100%" stop-color="'+color+'" stop-opacity=".01"/></linearGradient></defs>';[0,.5,1].forEach(pct=>{const y=p.t+iH*(1-pct);const v=mn+rng*pct;s+='<line x1="'+p.l+'" y1="'+y+'" x2="'+(w-p.r)+'" y2="'+y+'" stroke="rgba(255,255,255,.04)" stroke-dasharray="3,3"/><text x="'+(p.l-4)+'" y="'+(y+3)+'" text-anchor="end" fill="#4a5470" font-size="8" font-family="JetBrains Mono">'+Math.round(v).toLocaleString()+'</text>';});s+='<path d="'+area+'" fill="url(#'+gid+')"/><path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2"/><circle cx="'+pts[pts.length-1].x+'" cy="'+pts[pts.length-1].y+'" r="4" fill="'+color+'" stroke="#080818" stroke-width="2"/>';if(lk){const step=Math.ceil(data.length/8);pts.forEach((pt,i)=>{if(i%step===0||i===pts.length-1)s+='<text x="'+pt.x+'" y="'+(h-4)+'" text-anchor="middle" fill="#5c6888" font-size="7" font-family="JetBrains Mono">'+pt.d+'</text>';});}s+='</svg>';return s;}

function render(){
  const fg=S.fgScore,fgcol=fgC(fg),fglab=fgL(fg),act=fgAct(fg);
  const nR=S.CR!==null?S.CR:(NC[S.SP]||15.1),stk=100-S.BO;
  const sim=runSim(nR,S.BO),fn=sim.data[sim.data.length-1];
  const pRes=AL.map(p=>{const r=runSim(nR,p.b);const f=r.data[r.data.length-1];return{...p,bal:f.bal,pr:f.pr};});
  const sb=fn.bal;let rs=sb*(stk/100),rb=sb*(S.BO/100);const rData=[{lb:"시작",bal:Math.round(rs+rb)}];let dep=false;
  for(let m=1;m<=S.RY*12;m++){const mR2=Math.pow(1+nR/100,1/12)-1,mB2=Math.pow(1+S.BR/100,1/12)-1;rs*=(1+mR2);rb*=(1+mB2);rs-=S.RM*(stk/100);rb-=S.RM*(S.BO/100);if(rs+rb<=0){dep=true;rData.push({lb:Math.floor(m/12)+"년"+m%12+"개월",bal:0});break;}if(m%12===0||m===S.RY*12)rData.push({lb:Math.floor(m/12)+"년",bal:Math.round(rs+rb)});}
  const mxB=Math.max(...sim.data.map(d=>d.bal),1);

  // 나스닥 고점대비
  const ndqDD=S.ndqATH>0?((S.ndqNow-S.ndqATH)/S.ndqATH*100):0;
  const ddCol=ndqDD>=0?"#00d4aa":ndqDD>-5?"#f59e0b":ndqDD>-10?"#f97316":ndqDD>-15?"#ef4444":"#dc2626";
  const ddLab=ndqDD>=0?"신고가 근처":ndqDD>-5?"소규모 조정":ndqDD>-10?"본격 조정":ndqDD>-15?"급락":"폭락";

  const today=new Date();const dateStr=today.getFullYear()+"."+String(today.getMonth()+1).padStart(2,"0")+"."+String(today.getDate()).padStart(2,"0");

  let h=`<div style="text-align:center;margin-bottom:28px">
    <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:8px"><div style="width:8px;height:8px;border-radius:50%;background:#00d4aa;box-shadow:0 0 10px #00d4aa88"></div><span style="font-size:11px;color:#00d4aa;font-weight:600;letter-spacing:.14em">CJB 청주방송</span></div>
    <h1 style="font-family:'Outfit';font-size:clamp(22px,5vw,36px);font-weight:800;background:linear-gradient(135deg,#fff,#a0b0d0,#00d4aa);-webkit-background-clip:text;-webkit-text-fill-color:transparent">CJB청주방송 부자보고서</h1>
    <div style="font-size:11px;color:#5c6888;margin-top:6px">${dateStr} 기준</div>
  </div><div style="max-width:920px;margin:0 auto">`;

  // ═══ 1. 나스닥 현황 + 고점대비 ═══
  h+=`<div class="cd" style="background:rgba(0,212,170,.03);border-color:rgba(0,212,170,.15)">
    <div style="font-size:14px;font-weight:700;color:#00d4aa;margin-bottom:14px">📈 나스닥 현황</div>
    <div class="g gn" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:12px">
      <div>
        <span class="lbl">현재 나스닥 지수</span>
        <input class="inp" type="number" value="${S.ndqNow}" onchange="S.ndqNow=+this.value;save();render()" style="font-size:20px;font-weight:700;color:#00d4aa">
      </div>
      <div>
        <span class="lbl">고점 ATH</span>
        <input class="inp" type="number" value="${S.ndqATH}" onchange="S.ndqATH=+this.value;save();render()" style="font-size:20px;font-weight:700;color:#7a84a6">
      </div>
      <div style="text-align:center;display:flex;flex-direction:column;justify-content:center">
        <div style="background:${ddCol}15;border:1px solid ${ddCol}33;border-radius:12px;padding:12px 16px">
          <div style="font-size:9px;color:#7a84a6">고점 대비</div>
          <div class="jm" style="font-size:28px;font-weight:700;color:${ddCol}">${ndqDD>=0?"+":""}${ndqDD.toFixed(1)}%</div>
          <div style="font-size:10px;color:${ddCol};font-weight:600">${ddLab}</div>
        </div>
      </div>
    </div>
    <div style="font-size:9px;color:#5c6888">💡 <a href="https://www.google.com/finance/quote/.IXIC:INDEXNASDAQ" target="_blank" style="color:#6c8aff;text-decoration:none">Google Finance</a>에서 최신 나스닥 지수를 확인하고 입력하세요</div>
  </div>`;

  // ═══ 2. 공포탐욕지수 (컴팩트) ═══
  h+=`<div class="cd" style="padding:16px;background:${fgcol}08;border-color:${fgcol}33">
    <div style="display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      <div style="text-align:center;min-width:90px">
        <div style="font-size:9px;color:#7a84a6;font-weight:600">공포탐욕지수</div>
        <input class="inp" type="number" min="0" max="100" value="${S.fgScore}" onchange="S.fgScore=Math.max(0,Math.min(100,+this.value));save();render()" style="width:80px;font-size:28px;font-weight:800;color:${fgcol};text-align:center;padding:4px;font-family:'Outfit'">
        <div style="font-size:10px;font-weight:700;color:${fgcol}">${fglab}</div>
      </div>
      <div style="flex:1;min-width:180px">
        <div style="height:10px;border-radius:5px;background:linear-gradient(90deg,#dc2626,#f97316,#eab308,#22c55e,#06b6d4);position:relative;margin-bottom:4px">
          <div style="position:absolute;left:${fg}%;top:-2px;width:4px;height:14px;background:#fff;border-radius:2px;transform:translateX(-50%);box-shadow:0 0 8px rgba(255,255,255,.5)"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:7px;color:#5c6888"><span>0 극도공포</span><span>25</span><span>50 중립</span><span>75</span><span>100 극도탐욕</span></div>
      </div>
      <div style="background:${act.c}15;border:1px solid ${act.c}44;border-radius:8px;padding:6px 14px;text-align:center">
        <div style="font-size:11px;font-weight:700;color:${act.c}">${act.t}</div>
      </div>
    </div>
    <div style="font-size:9px;color:#5c6888;margin-top:8px">💡 <a href="https://edition.cnn.com/markets/fear-and-greed" target="_blank" style="color:#6c8aff;text-decoration:none">CNN Fear & Greed</a>에서 오늘 지수를 확인하고 입력하세요</div>`;
  if(FG.hist.length>2){h+=`<div style="margin-top:10px">`+chart(FG.hist,"v","d",fgcol,100,"fgc")+`</div>`;}
  h+=`</div>`;

  // ═══ Summary ═══
  h+=`<div class="g g4" style="margin-bottom:20px">${[{l:"총 예상 자산",v:fK(fn.bal),s:fU(fn.bU),c:"#00d4aa",i:"📈"},{l:"투자 원금",v:fK(fn.inv),s:fU(fn.iU),c:"#6c8aff",i:"💰"},{l:"순수익",v:(fn.pft>=0?"+":"")+fK(fn.pft),s:(fn.pr>=0?"+":"")+fn.pr.toFixed(1)+"%",c:fn.pft>=0?"#00d4aa":"#ff6b6b",i:"✨"},{l:"주식"+stk+"% 채권"+S.BO+"%",v:fK(fn.stk),s:"채권 "+fK(fn.bnd),c:"#c084fc",i:"⚖️"}].map(c=>`<div class="cd" style="padding:14px 16px;position:relative;overflow:hidden;margin-bottom:0"><div style="position:absolute;top:8px;right:10px;font-size:18px;opacity:.5">${c.i}</div><div style="font-size:8px;color:#7a84a6;text-transform:uppercase;letter-spacing:.1em;font-weight:600;margin-bottom:5px">${c.l}</div><div class="jm" style="font-size:clamp(13px,2.5vw,18px);font-weight:700;color:${c.c}">${c.v}</div><div class="jm" style="font-size:10px;color:#5c6888;margin-top:2px">${c.s}</div></div>`).join("")}</div>`;

  // ═══ 설정 ═══
  h+=`<div class="cd"><div style="font-size:13px;font-weight:700;margin-bottom:16px;color:#e0e8f8">⚙️ 투자 설정</div><div class="g g2" style="margin-bottom:16px">
    <div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="lbl">초기 투자금</span><span class="jm" style="font-size:14px;font-weight:700;color:#00d4aa">${fK(S.P)}</span></div><input type="range" min="1000000" max="500000000" step="1000000" value="${S.P}" oninput="S.P=+this.value;save();render()" style="accent-color:#00d4aa"><div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">${[1e7,3e7,5e7,1e8,3e8].map(v=>`<button class="btn" onclick="S.P=${v};save();render()" style="${S.P===v?"border-color:#00d4aa;background:rgba(0,212,170,.12);color:#00d4aa":""}">${fS(v)}</button>`).join("")}</div></div>
    <div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="lbl">월 적립금</span><span class="jm" style="font-size:14px;font-weight:700;color:#6c8aff">${fK(S.M)}</span></div><input type="range" min="0" max="10000000" step="100000" value="${S.M}" oninput="S.M=+this.value;save();render()" style="accent-color:#6c8aff"><div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">${[0,3e5,5e5,1e6,2e6,5e6].map(v=>`<button class="btn" onclick="S.M=${v};save();render()" style="${S.M===v?"border-color:#6c8aff;background:rgba(108,138,255,.12);color:#a8baff":""}">${fS(v)}</button>`).join("")}</div></div>
  </div><div class="g g2">
    <div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="lbl">투자 기간</span><span class="jm" style="font-size:14px;font-weight:700;color:#c084fc">${S.Y}년</span></div><input type="range" min="1" max="40" value="${S.Y}" oninput="S.Y=+this.value;save();render()" style="accent-color:#c084fc"><div style="display:flex;gap:4px;margin-top:6px">${[5,10,15,20,30].map(v=>`<button class="btn" onclick="S.Y=${v};save();render()" style="${S.Y===v?"border-color:#c084fc;background:rgba(192,132,252,.12);color:#c084fc":""}">${v}년</button>`).join("")}</div></div>
    <div><span class="lbl">환율 (₩/$)</span><input class="inp" type="number" value="${S.EX}" onchange="S.EX=+this.value;save();render()"></div>
  </div></div>`;

  // ═══ 수익률 ═══
  h+=`<div class="cd" style="background:rgba(0,212,170,.02);border-color:rgba(0,212,170,.1)"><div style="font-size:13px;font-weight:700;margin-bottom:12px;color:#00d4aa">📊 나스닥 수익률 (CAGR)</div><div class="g gp" style="margin-bottom:12px">${Object.entries(NC).map(([k,v])=>{const n=+k,on=S.CR===null&&S.SP===n;return`<button onclick="S.SP=${n};S.CR=null;save();render()" style="padding:10px 6px;border-radius:10px;text-align:center;border:${on?"1.5px solid #00d4aa":"1px solid rgba(255,255,255,.08)"};background:${on?"rgba(0,212,170,.1)":"rgba(255,255,255,.02)"}"><div style="font-size:10px;color:${on?"#00d4aa":"#7a84a6"};font-weight:600">${k}년</div><div class="jm" style="font-size:17px;font-weight:700;color:${on?"#00d4aa":"#c8d0e8"}">${v}%</div></button>`;}).join("")}<button onclick="if(S.CR===null){S.CR=${nR};save();render();}" style="padding:10px 6px;border-radius:10px;text-align:center;border:${S.CR!==null?"1.5px solid #ffd93d":"1px solid rgba(255,255,255,.08)"};background:${S.CR!==null?"rgba(255,217,61,.08)":"rgba(255,255,255,.02)"}"><div style="font-size:10px;color:${S.CR!==null?"#ffd93d":"#7a84a6"};font-weight:600">직접입력</div><div class="jm" style="font-size:17px;font-weight:700;color:${S.CR!==null?"#ffd93d":"#5c6888"}">${S.CR!==null?S.CR+"%":"✏️"}</div></button></div>${S.CR!==null?`<div style="background:rgba(255,217,61,.05);border-radius:10px;border:1px solid rgba(255,217,61,.15);padding:12px;display:flex;gap:8px;align-items:center"><input class="inp" type="number" value="${S.CR}" step="0.1" style="max-width:130px;font-size:18px;font-weight:700;color:#ffd93d;text-align:center" onchange="S.CR=+this.value;save();render()"><span style="color:#ffd93d;font-weight:700">%</span><button onclick="S.CR=null;save();render()" style="padding:6px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.05);color:#7a84a6;font-size:11px;font-weight:600">기간별</button></div>`:""}</div>`;

  // ═══ 채권 ═══
  h+=`<div class="cd"><div style="font-size:13px;font-weight:700;margin-bottom:12px;color:#8b9fff">🏦 채권 비중</div><div class="g g2" style="margin-bottom:12px">
    <div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:10px;color:#00d4aa;font-weight:600">주식 ${stk}%</span><span style="font-size:10px;color:#6c8aff;font-weight:600">채권 ${S.BO}%</span></div><input type="range" min="0" max="100" step="5" value="${S.BO}" oninput="S.BO=+this.value;save();render()" style="accent-color:#6c8aff"><div style="display:flex;height:20px;border-radius:6px;overflow:hidden;gap:2px;margin-top:8px">${stk>0?`<div style="width:${stk}%;background:linear-gradient(135deg,#00d4aa,#00b894);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff">${stk>=18?stk+"%":""}</div>`:""}${S.BO>0?`<div style="width:${S.BO}%;background:linear-gradient(135deg,#6c8aff,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff">${S.BO>=18?S.BO+"%":""}</div>`:""}</div><div style="display:flex;gap:4px;margin-top:8px;flex-wrap:wrap">${AL.map(p=>`<button class="btn" onclick="S.BO=${p.b};save();render()" style="${S.BO===p.b?"border-color:#6c8aff;background:rgba(108,138,255,.12);color:#a8baff":""}">${p.l}</button>`).join("")}</div></div>
    <div><span class="lbl">채권 연수익률 (%)</span><input class="inp" type="number" value="${S.BR}" step="0.1" min="0" max="20" onchange="S.BR=+this.value;save();render()"></div>
  </div><div class="g ga">${pRes.map(p=>{const me=p.b===S.BO;return`<div onclick="S.BO=${p.b};save();render()" style="background:${me?"rgba(192,132,252,.1)":"rgba(255,255,255,.02)"};border:${me?"1.5px solid #c084fc":"1px solid rgba(255,255,255,.06)"};border-radius:10px;padding:10px 8px;text-align:center;cursor:pointer"><div style="font-size:9px;color:${me?"#c084fc":"#7a84a6"};font-weight:700">${p.l}</div><div class="jm" style="font-size:13px;font-weight:700;color:${me?"#c084fc":"#e4e4f0"};margin-top:3px">${fK(p.bal)}</div><div class="jm" style="font-size:10px;color:${p.pr>=0?"#00d4aa":"#ff6b6b"};font-weight:600">${p.pr>=0?"+":""}${p.pr.toFixed(1)}%</div></div>`;}).join("")}</div></div>`;

  // ═══ 하락장 ═══
  h+=`<div class="cd" style="background:rgba(255,217,61,.02);border-color:rgba(255,217,61,.08)"><div style="font-size:13px;font-weight:700;margin-bottom:10px;color:#ffd93d">🎯 하락 시 추가매수</div>${[{l:"-5%",c:"#ffd93d",d:"소규모",k:"d5",fk:"f5"},{l:"-10%",c:"#ff9f43",d:"본격",k:"d10",fk:"f10"},{l:"-15%",c:"#ff6b6b",d:"급락",k:"d15",fk:"f15"}].map(d=>`<div style="display:grid;grid-template-columns:65px 1fr 1fr;gap:8px;align-items:center;margin-bottom:6px;padding:8px 10px;background:rgba(0,0,0,.15);border-radius:10px"><div><div style="font-size:12px;font-weight:700;color:${d.c}">${d.l}</div><div style="font-size:8px;color:#5c6888">${d.d}</div></div><div><span class="lbl" style="font-size:8px;margin-bottom:2px">금액(원)</span><input class="inp inps" type="number" value="${S[d.k]}" onchange="S.${d.k}=+this.value;save();render()"></div><div><span class="lbl" style="font-size:8px;margin-bottom:2px">연간횟수</span><input class="inp inps" type="number" value="${S[d.fk]}" step="0.5" min="0" max="12" onchange="S.${d.fk}=+this.value;save();render()"></div></div>`).join("")}</div>`;

  // ═══ 은퇴 ═══
  h+=`<div class="cd" style="background:rgba(192,132,252,.02);border-color:rgba(192,132,252,.1)"><div style="font-size:13px;font-weight:700;margin-bottom:10px;color:#c084fc">🏠 은퇴 후 인출</div><div class="g g2" style="margin-bottom:14px">
    <div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="lbl">월 인출금</span><span class="jm" style="font-size:14px;font-weight:700;color:#c084fc">${fK(S.RM)}</span></div><input type="range" min="500000" max="20000000" step="500000" value="${S.RM}" oninput="S.RM=+this.value;save();render()" style="accent-color:#c084fc"><div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">${[2e6,3e6,5e6,7e6,1e7].map(v=>`<button class="btn" onclick="S.RM=${v};save();render()" style="${S.RM===v?"border-color:#c084fc;background:rgba(192,132,252,.12);color:#c084fc":""}">${fS(v)}</button>`).join("")}</div></div>
    <div><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="lbl">인출 기간</span><span class="jm" style="font-size:14px;font-weight:700;color:#c084fc">${S.RY}년</span></div><input type="range" min="5" max="50" value="${S.RY}" oninput="S.RY=+this.value;save();render()" style="accent-color:#c084fc"></div>
  </div><div style="background:rgba(0,0,0,.15);border-radius:12px;padding:14px">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px;text-align:center">
      <div><div style="font-size:9px;color:#7a84a6">시작자산</div><div class="jm" style="font-size:14px;font-weight:700;color:#00d4aa;margin-top:3px">${fK(sb)}</div></div>
      <div><div style="font-size:9px;color:#7a84a6">월인출</div><div class="jm" style="font-size:14px;font-weight:700;color:#c084fc;margin-top:3px">${fK(S.RM)}</div></div>
      <div><div style="font-size:9px;color:#7a84a6">결과</div><div class="jm" style="font-size:14px;font-weight:700;color:${dep?"#ff6b6b":"#00d4aa"};margin-top:3px">${dep?rData[rData.length-1].lb+" 소진":fK(rData[rData.length-1].bal)+" 잔액"}</div></div>
    </div>
    ${chart(rData.map(d=>({d:d.lb,v:d.bal})),"v","d","#c084fc",130,"rtc")}
    ${dep?`<div style="text-align:center;padding:6px;background:rgba(255,107,107,.1);border-radius:8px;margin-top:6px;font-size:10px;color:#ff6b6b;font-weight:600">⚠️ 자금소진</div>`:`<div style="text-align:center;padding:6px;background:rgba(0,212,170,.06);border-radius:8px;margin-top:6px;font-size:10px;color:#00d4aa;font-weight:600">✅ ${S.RY}년 후 ${fK(rData[rData.length-1].bal)} 잔액</div>`}
  </div></div>`;

  // ═══ Tabs ═══
  h+=`<div style="display:flex;gap:4px;margin-bottom:14px;overflow-x:auto">${[{k:"chart",l:"📊 성장차트"},{k:"table",l:"📋 상세내역"},{k:"history",l:"📈 수익률"}].map(t=>`<button class="tab ${S.tab===t.k?"on":""}" onclick="S.tab='${t.k}';save();render()">${t.l}</button>`).join("")}</div>`;

  if(S.tab==="chart"){const cW=700,cH=260,pd={t:24,r:16,b:36,l:70},iW2=cW-pd.l-pd.r,iH2=cH-pd.t-pd.b;let svg=`<svg viewBox="0 0 ${cW} ${cH}" style="width:100%;max-height:280px"><defs><linearGradient id="ag2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00d4aa" stop-opacity=".15"/><stop offset="100%" stop-color="#00d4aa" stop-opacity=".01"/></linearGradient></defs>`;[0,.25,.5,.75,1].forEach(p=>{const y=pd.t+iH2*(1-p);svg+=`<line x1="${pd.l}" y1="${y}" x2="${cW-pd.r}" y2="${y}" stroke="rgba(255,255,255,.04)" stroke-dasharray="4,4"/><text x="${pd.l-6}" y="${y+4}" text-anchor="end" fill="#4a5470" font-size="8" font-family="JetBrains Mono">${fS(mxB*p)}</text>`;});const pts=sim.data.map((d,i)=>({x:pd.l+(i/Math.max(sim.data.length-1,1))*iW2,yB:pd.t+iH2-(d.bal/mxB)*iH2,yI:pd.t+iH2-(d.inv/mxB)*iH2,...d}));const bP=pts.map((p,i)=>(i===0?"M":"L")+p.x+","+p.yB).join(" "),iP=pts.map((p,i)=>(i===0?"M":"L")+p.x+","+p.yI).join(" ");svg+=`<path d="${bP}${[...pts].reverse().map(p=>"L"+p.x+","+p.yI).join("")}Z" fill="url(#ag2)"/><path d="${iP}" fill="none" stroke="#6c8aff" stroke-width="1.5" stroke-dasharray="5,4" opacity=".6"/><path d="${bP}" fill="none" stroke="#00d4aa" stroke-width="2.5"/>`;pts.forEach((p,i)=>{svg+=`<circle cx="${p.x}" cy="${p.yB}" r="3" fill="#00d4aa" stroke="#080818" stroke-width="2"/><text x="${p.x}" y="${cH-6}" text-anchor="middle" fill="#5c6888" font-size="8" font-family="JetBrains Mono">${p.lb}</text>`;if(i===pts.length-1)svg+=`<text x="${p.x}" y="${p.yB-8}" text-anchor="end" fill="#00d4aa" font-size="9" font-weight="600" font-family="JetBrains Mono">${fS(p.bal)}</text>`;});svg+=`</svg>`;h+=`<div class="cd">${svg}</div>`;}

  if(S.tab==="table"){h+=`<div class="cd" style="padding:0;overflow:hidden"><div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:11px"><thead><tr style="background:rgba(108,138,255,.07)">${["기간","총자산","주식","채권","원금","수익률"].map((x,i)=>`<th style="padding:10px 12px;text-align:${i===0?"left":"right"};color:#7a84a6;font-size:9px;font-weight:600;border-bottom:1px solid rgba(255,255,255,.05)">${x}</th>`).join("")}</tr></thead><tbody>${sim.data.map((r,i)=>`<tr style="background:${i%2?"rgba(255,255,255,.012)":"transparent"}"><td style="padding:8px 12px;font-weight:600;color:#c8d0e8">${r.lb}</td><td class="jm" style="padding:8px 12px;text-align:right;color:#00d4aa;font-weight:600">${fK(r.bal)}</td><td class="jm" style="padding:8px 12px;text-align:right;color:#4ade80;font-size:10px">${fK(r.stk)}</td><td class="jm" style="padding:8px 12px;text-align:right;color:#818cf8;font-size:10px">${fK(r.bnd)}</td><td class="jm" style="padding:8px 12px;text-align:right;color:#7a84a6">${fK(r.inv)}</td><td class="jm" style="padding:8px 12px;text-align:right;font-weight:600;color:${r.pr>=0?"#00d4aa":"#ff6b6b"}">${r.pr>=0?"+":""}${r.pr.toFixed(1)}%</td></tr>`).join("")}</tbody></table></div></div>`;}

  if(S.tab==="history"){h+=`<div class="cd"><div style="font-size:12px;font-weight:700;color:#c8d0e8;margin-bottom:10px">나스닥100 연도별 수익률</div><div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px">${Object.entries(NY).sort(([a],[b])=>b-a).map(([y,r])=>`<div style="background:${r>=0?"rgba(0,212,170,.04)":"rgba(255,107,107,.04)"};border:1px solid ${r>=0?"rgba(0,212,170,.1)":"rgba(255,107,107,.1)"};border-radius:8px;padding:8px 6px;text-align:center"><div style="font-size:9px;color:#5c6888;font-weight:600">${y}</div><div class="jm" style="font-size:12px;font-weight:700;color:${r>=0?"#00d4aa":"#ff6b6b"}">${r>=0?"+":""}${r}%</div></div>`).join("")}</div></div>`;}

  h+=`<div style="margin-top:18px;padding:10px 14px;background:rgba(255,255,255,.02);border-radius:12px;border:1px solid rgba(255,255,255,.04)"><div style="font-size:9px;color:#4a5470;line-height:1.7">⚠️ <strong style="color:#5c6888">투자 유의사항</strong> — 과거 CAGR 기반 참고용이며 미래 수익을 보장하지 않습니다.</div></div></div>`;
  document.getElementById("app").innerHTML=h;
}

// CNN API 시도 (성공하면 공탐지수 히스토리 차트 표시, 실패해도 OK)
try{
  fetch("https://production.dataviz.cnn.io/index/fearandgreed/graphdata/2025-01-01")
    .then(r=>r.json()).then(d=>{
      if(d&&d.fear_and_greed&&d.fear_and_greed.score!=null) S.fgScore=Math.round(d.fear_and_greed.score);
      if(d&&d.fear_and_greed_historical&&d.fear_and_greed_historical.data) FG.hist=d.fear_and_greed_historical.data.map(p=>{const dt=new Date(p.x);return{d:(dt.getMonth()+1)+"/"+dt.getDate(),v:Math.round(p.y)};}).slice(-90);
      save();render();
    }).catch(()=>{});
}catch(e){}
render();
</script></body></html>
